<!DOCTYPE html>
<html>
<head>
  <title>Talent OS Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin: auto;
      max-width: 350px;
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      width: 95%;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Talent OS Subscription</h2>

<div class="box">

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="WhatsApp Number">

<select id="plan">
  <option value="">Select Plan</option>
  <option value="199">₹199 - 3 Months</option>
  <option value="499">₹499 - 6 Months</option>
  <option value="custom">Other Amount</option>
</select>

<input id="customAmount" placeholder="Enter Amount" style="display:none">

<input id="txn" placeholder="Transaction ID">

<button onclick="pay()">Pay Now</button>
<button onclick="submitForm()">Submit</button>

</div>

<script>

const upi = "dharmeshband492-2@oksbi";

document.getElementById("plan").addEventListener("change", function(){
  if(this.value === "custom"){
    document.getElementById("customAmount").style.display = "block";
  } else {
    document.getElementById("customAmount").style.display = "none";
  }
});

function getAmount(){
  let plan = document.getElementById("plan").value;
  if(plan === "custom"){
    return document.getElementById("customAmount").value;
  }
  return plan;
}

// UPI PAY
function pay(){
  let amount = getAmount();

  if(!amount){
    alert("Select plan");
    return;
  }

  let link = `upi://pay?pa=${upi}&pn=TalentOS&am=${amount}&cu=INR`;
  window.location.href = link;
}

// SUBMIT
async function submitForm(){

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let txn = document.getElementById("txn").value;
  let amount = getAmount();

  if(!name || !email || !phone || !txn || !amount){
    alert("Fill all details");
    return;
  }

  await fetch("https://talent-payment.onrender.com/pay", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, email, phone, txn, amount })
  });

  alert("Payment Submitted ✅");
}

</script>

</body>
</html>
