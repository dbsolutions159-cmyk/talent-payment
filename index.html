<!DOCTYPE html>
<html>
<head>
  <title>Talent OS Payment</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .plan {
      background: #334155;
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }

    .selected {
      background: #22c55e;
    }
  </style>
</head>

<body>

<h1>🚀 Talent OS Subscription</h1>

<div class="box">

  <h3>Select Plan</h3>

  <div class="plan" onclick="selectPlan(199)">₹199 (3 Months)</div>
  <div class="plan" onclick="selectPlan(499)">₹499 (6 Months) ⭐ Recommended</div>

  <input id="custom" placeholder="Custom Amount (optional)" />

  <input id="name" placeholder="Your Name" />
  <input id="email" placeholder="Email" />
  <input id="txn" placeholder="Transaction ID" />

  <button onclick="pay()">Submit Payment</button>

</div>

<script>

let selectedAmount = 0;

function selectPlan(amount){
  selectedAmount = amount;

  document.querySelectorAll(".plan").forEach(el => el.classList.remove("selected"));
  event.target.classList.add("selected");
}

async function pay(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const txn = document.getElementById("txn").value;
  const custom = document.getElementById("custom").value;

  let amount = custom || selectedAmount;

  if(!name || !email || !txn || !amount){
    alert("Fill all details");
    return;
  }

  const res = await fetch("/pay", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, txn, amount })
  });

  const data = await res.json();

  if(data.success){
    alert("Payment Success ✅");

    if(data.whatsapp){
      window.open(data.whatsapp);
    }

  } else {
    alert("Error ❌");
  }

}

</script>

</body>
</html>
