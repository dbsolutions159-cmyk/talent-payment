<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
</head>

<body>

<h2>Payment Test</h2>

<button onclick="selectPlan(199)">₹199</button>
<button onclick="selectPlan(499)">₹499</button>

<br><br>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="txn" placeholder="Txn"><br><br>

<button onclick="submitForm()">Submit</button>

<script>

let selectedAmount = 0;

function selectPlan(amount){
  selectedAmount = amount;
  alert("Selected ₹" + amount);
}

async function submitForm(){

  console.log("Clicked submit");

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let txn = document.getElementById("txn").value;

  if(!name || !email || !txn || !selectedAmount){
    alert("Fill all");
    return;
  }

  try {
    const res = await fetch("https://talent-payment.onrender.com/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        txn,
        amount: selectedAmount
      })
    });

    console.log("Response received");

    const data = await res.json();

    console.log(data);

    alert("Done ✅");

  } catch (err){
    console.log("Error:", err);
    alert("Error ❌");
  }
}

</script>

</body>
</html>
