<!DOCTYPE html>
<html>
<head>
  <title>Talent OS Payment</title>
</head>
<body>

<h2>Select Plan</h2>
<button onclick="selectPlan(199)">₹199</button>
<button onclick="selectPlan(499)">₹499</button>

<h3>Details</h3>
<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="txn" placeholder="Transaction ID"><br><br>

<button id="submitBtn">Submit</button>

<script>
let selectedAmount = 0;

function selectPlan(amount){
  selectedAmount = amount;
  alert("Selected ₹" + amount);
}

document.getElementById("submitBtn").addEventListener("click", async () => {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const txn = document.getElementById("txn").value;

  if(!name || !email || !txn || !selectedAmount){
    alert("Fill all fields");
    return;
  }

  const res = await fetch("https://talent-payment.onrender.com/pay", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, email, txn, amount: selectedAmount })
  });

  const data = await res.json();
  console.log(data);

  if(data.success){
    alert("✅ Done");
  } else {
    alert("❌ Error");
  }

});
</script>

</body>
</html>
