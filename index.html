<!DOCTYPE html>
<html>
<head>
  <title>Talent OS Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      color: #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .pay-btn {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .copy-btn {
      background: #3b82f6;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    img {
      margin-top: 10px;
      border-radius: 10px;
    }

    .tag {
      color: gold;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>Talent OS Subscription</h1>

<div class="container">

  <!-- ₹199 -->
  <div class="card">
    <div class="price">₹199</div>
    <p>3 Months</p>

    <button class="pay-btn" onclick="pay(199)">Pay Now</button>

    <img id="qr199" width="180">

    <button class="copy-btn" onclick="copyUPI()">Copy UPI ID</button>
  </div>

  <!-- ₹499 -->
  <div class="card">
    <div class="price">₹499</div>
    <p>6 Months</p>
    <p class="tag">⭐ Recommended</p>

    <button class="pay-btn" onclick="pay(499)">Pay Now</button>

    <img id="qr499" width="180">

    <button class="copy-btn" onclick="copyUPI()">Copy UPI ID</button>
  </div>

  <!-- FORM -->
  <div class="card">
    <h3>Confirm Payment</h3>

    <input id="name" placeholder="Your Name">
    <input id="email" placeholder="Your Email">
    <input id="txn" placeholder="Transaction ID">

    <button class="pay-btn" onclick="submitForm()">Submit</button>
  </div>

</div>

<script>

const upiID = "dharmeshband492-2@oksbi";
let selectedAmount = 0;

// QR generate
document.getElementById("qr199").src =
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${upiID}&pn=TalentOS&am=199&cu=INR`;

document.getElementById("qr499").src =
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${upiID}&pn=TalentOS&am=499&cu=INR`;

// UPI pay
function pay(amount){
  selectedAmount = amount;

  let upiLink = `upi://pay?pa=${upiID}&pn=TalentOS&am=${amount}&cu=INR`;

  window.location.href = upiLink;

  setTimeout(()=>{
    alert("If UPI app not opened, scan QR or copy UPI ID");
  },2000);
}

// Copy UPI
function copyUPI(){
  navigator.clipboard.writeText(upiID);
  alert("UPI ID copied!");
}

// FINAL SUBMIT (CONNECTED TO BACKEND)
async function submitForm(){

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let txn = document.getElementById("txn").value;

  if(!name || !email || !txn || !selectedAmount){
    alert("Fill all details & select plan");
    return;
  }

  try {
    const res = await fetch("https://talent-payment.onrender.com/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        txn,
        amount: selectedAmount
      })
    });

    const data = await res.json();

    if(data.success){
      alert("Payment Submitted Successfully ✅\nCheck your email!");

      // reset
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("txn").value = "";
      selectedAmount = 0;

    } else {
      alert("Something went wrong ❌");
    }

  } catch (err){
    alert("Server error ❌");
    console.log(err);
  }
}

</script>

</body>
</html>
